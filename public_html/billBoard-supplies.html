<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billboard Handheld Devices</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,400;0,500;0,600;0,700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Urbanist', sans-serif;
            background: #f6f6f6;
            padding: 80px;
        }

        .billboard {
            width: 100%;
            max-width: 1320px;
            min-height: 568px;
            border-radius: 80px;
            background-color: #fff;
            padding: 40px;
            padding-left: 60px;
            display: flex;
            align-items: center;
            margin: 0 auto;
            position: relative;
        }

        .billboard__eyebrow {
            color: #399CDB;
            font-family: 'Urbanist', sans-serif;
            font-size: 24px;
            font-style: normal;
            font-weight: 600;
            line-height: normal;
            margin-bottom: 10px;
        }

        .billboard__title {
            margin-bottom: 15px;
        }

        .billboard__title-prefix {
            color: #0E0E0E;
            font-family: Urbanist;
            font-size: 48px;
            font-style: normal;
            font-weight: 600;
            line-height: normal;
        }

        .billboard__title-accent {
            color: #399CDB;
            font-family: Urbanist;
            font-size: 48px;
            font-style: normal;
            font-weight: 600;
            line-height: normal;
        }

        .billboard__description {
            margin-bottom: 40px;
            color: #454745;
            font-family: Urbanist;
            font-size: 24px;
            font-style: normal;
            font-weight: 400;
            line-height: 34px;
            margin-bottom: 40px;
            /* 141.667% */
        }

        .billboard__cta {
            display: inline-flex;
            justify-content: center;
            min-width: 86px;
            height: 31px;
            padding: 0 18px;
            line-height: 1;
            text-decoration: none;
            height: 48px;
            padding: 16px 40px;
            justify-content: center;
            align-items: center;
            color: #FFF;
            text-align: center;
            font-family: Urbanist;
            font-size: 16px;
            font-style: normal;
            font-weight: 600;
            line-height: 16px;
            border-radius: 100px;
            background: #399CDB;
        }

        .billboard__content {
            width: 588px;
            max-width: 100%;
        }

        .handheldProductImageDisplayBox {
            aspect-ratio: 25/28;
            position: absolute;
            right: 40px;
            width: 519px;
            height: 488px;
            overflow: hidden;
            border-radius: 56.516px;
            background: #399CDB;
        }

        .billboard__image {
            position: relative;
            z-index: 1;
            display: block;
            width: 100%;
            height: auto;
        }

        @media (max-width: 1440px) {
            body {
                padding: 40px;
            }

            .billboard {
                padding-right: 40%;
            }

            .handheldProductImageDisplayBox {
                right: 24px;
                width: 35%;
                height: auto;
            }
        }

        @media (max-width: 430px) {
            body {
                padding: 24px;
            }

            .billboard {
                min-height: 0;
                border-radius: 32px;
                padding: 28px 24px 32px;
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }

            .handheldProductImageDisplayBox {
                position: relative;
                right: auto;
                width: 100%;
                max-width: 260px;
                height: auto;
                align-self: center;
                border-radius: 28px;
            }

            .billboard__content {
                width: 100%;
            }

            .billboard__eyebrow {
                font-size: 16px;
                margin-bottom: 8px;
            }

            .billboard__title {
                margin-bottom: 12px;
            }

            .billboard__title-prefix,
            .billboard__title-accent {
                font-size: 32px;
                line-height: 1.12;
            }

            .billboard__description {
                font-size: 16px;
                line-height: 24px;
                margin-bottom: 24px;
            }

            .billboard__cta {
                width: 100%;
                max-width: 160px;
                height: 44px;
                padding: 14px 24px;
                font-size: 15px;
            }
        }
    </style>
</head>

<body>
    <section class="billboard">
        <div class="handheldProductImageDisplayBox">
            <img src="../public_html/assets/billboard-hhd/billboard-supplies-starmicronics-and-paper.png"
                alt="Valor VP 800" class="billboard__image">
        </div>

        <div class="billboard__content">
            <p class="billboard__eyebrow">Star Micronics Paper</p>
            <h1 class="billboard__title"><span class="billboard__title-prefix">Simplify Your POS Setup</span></h1>
            <p class="billboard__description">Experience the best with essential Supplies for a Smooth Checkout
                Experience.</p>
            <a href="#" class="billboard__cta">Buy Now</a>
        </div>

    </section>
</body>

</html>
