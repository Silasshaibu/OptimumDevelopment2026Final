  <line x1="44" y1="92" x2="216" y2="92" stroke="#8FC99A" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Bar chart bars -->
  <rect x="52" y="112" width="26" height="40" rx="5" fill="#74BB85" opacity="0.75"/>
  <rect x="88" y="88" width="26" height="64" rx="5" fill="#3D9958" opacity="0.85"/>
