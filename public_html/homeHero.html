<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Hero - Optimum Payments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,400;0,500;0,600;0,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/styles/homeHero.css">
</head>

<body>
    <div class="home-hero">
        <div class="carouselControlsContainer">
            <div class="carouselSlideProgressBarContainer">
                <div class="carouselSlideProgressBar"></div>
                <div class="carouselSlideProgressBarInactive"></div>
                <div class="carouselSlideProgressBarInactive"></div>
            </div>
            <button class="play-pause-btn" type="button" aria-label="Pause carousel" aria-pressed="false">
                <svg class="pause-icon" viewBox="0 0 24 24" fill="white" width="12" height="12" style="display: block;"
                    aria-hidden="true">
                    <path d="M6 4h4v16H6zm8 0h4v16h-4z"></path>
                </svg>
                <svg class="play-icon" style="display:none" viewBox="0 0 24 24" fill="white" width="12" height="12"
                    aria-hidden="true">
                    <path d="M8 5v14l11-7z"></path>
                </svg>
            </button>
        </div>
        <div class="hero-info-left">
            <div class="hero-copy">
                <p class="hero-eyebrow">Optimum Payments</p>
                <p class="hero-section-title"><span class="hero-title">Accelerate
                        Your</span><br><span class="hero-title hero-title--highlight">Merchant
                        Application</span></p>
            </div>
            <div class="hero-content">
                <p class="hero-description">
                    Access the capital you need to grow with transparent terms and
                    quick approval cycles.</p>
                <div class="hero-actions">
                    <button class="hero-btn hero-btn--primary">
                        <span class="hero-btn__label">Apply
                            Now</span>
                    </button>
                    <button class="hero-btn hero-btn--secondary">
                        <span class="hero-btn__label">Learn
                            More</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const playPauseButton = document.querySelector('.play-pause-btn');
        const pauseIcon = document.querySelector('.pause-icon');
        const playIcon = document.querySelector('.play-icon');

        if (playPauseButton && pauseIcon && playIcon) {
            playPauseButton.addEventListener('click', () => {
                const isPaused = playPauseButton.getAttribute('aria-pressed') === 'true';
                const nextPausedState = !isPaused;

                playPauseButton.setAttribute('aria-pressed', String(nextPausedState));
                playPauseButton.setAttribute('aria-label', nextPausedState ? 'Play carousel' : 'Pause carousel');
                pauseIcon.style.display = nextPausedState ? 'none' : 'block';
                playIcon.style.display = nextPausedState ? 'block' : 'none';
            });
        }
    </script>
</body>

</html>
