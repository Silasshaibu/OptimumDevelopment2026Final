<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Navigation Bar - Optimum Payments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,400;0,500;0,600;0,700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Urbanist', sans-serif;
        }

        .topnavbar {
            display: flex;
            width: 100%;
            max-width: 1440px;
            min-height: 90px;
            padding: 20px 120px;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            background: #fff;
            border-bottom: 1px solid #efefef;
            margin: 0 auto;
        }

        .topnavbar-inner {
            display: flex;
            align-items: center;
            gap: 25px;
            width: 100%;
        }

        .topnavbar-logo {
            height: 50px;
            width: 158px;
            flex-shrink: 0;
        }

        .topnavbar-logo img {
            width: 158px;
            height: 50px;
            aspect-ratio: 79/25;
            margin-right: 25px;
        }

        .topnavbar-content {
            background: none;
            height: 50px;
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .topnavbar-links {
            display: flex;
            gap: 25px;
            align-items: center;
            min-width: 0;
        }

        .topnavbar-inner a {
            color: #2B2B2B;
            font-family: Urbanist;
            font-size: 16px;
            font-style: normal;
            font-weight: 500;
            line-height: 20px;
            text-decoration: none;
        }

        .topnavbar-inner a svg {
            margin-left: 5px;
            width: 8px;
            height: 8px;
        }

        .topnavbar-inner a.active {
            font-weight: 700;
        }

        .topnavbar-inner button {
            color: #FFF;
            font-family: Urbanist;
            font-size: 16px;
            font-style: normal;
            font-weight: 600;
            line-height: 20px;
            border: none;
            cursor: pointer;
        }

        .topnavbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 30px;
            color: #2B2B2B;
            font-family: Urbanist;
            font-size: 16px;
            font-style: normal;
            font-weight: 700;
            line-height: 20px;
            flex-shrink: 0;
        }

        .topnavbar-search {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .topnavbar-cta {
            display: flex;
            padding: 10px 15px;
            justify-content: center;
            align-items: center;
            gap: 10px;
            border-radius: 10px;
            background: #399CDB;
        }

        @media (max-width: 1440px) {
            .topnavbar {
                padding-left: 40px;
                padding-right: 40px;
            }
        }

        @media (max-width: 430px) {
            .topnavbar {
                min-height: 0;
                padding: 16px 24px;
            }

            .topnavbar-inner {
                flex-direction: column;
                align-items: stretch;
                gap: 16px;
            }

            .topnavbar-logo {
                width: 132px;
                height: 42px;
            }

            .topnavbar-logo img {
                width: 132px;
                height: 42px;
                margin-right: 0;
            }

            .topnavbar-content {
                height: auto;
                flex-direction: column;
                align-items: stretch;
                gap: 14px;
            }

            .topnavbar-links {
                gap: 16px;
                overflow-x: auto;
                padding-bottom: 4px;
            }

            .topnavbar-links::-webkit-scrollbar {
                display: none;
            }

            .topnavbar-inner a {
                font-size: 14px;
                white-space: nowrap;
            }

            .topnavbar-actions {
                margin-left: 0;
                justify-content: space-between;
                width: 100%;
            }

            .topnavbar-cta {
                padding: 10px 14px;
                font-size: 14px;
                line-height: 18px;
            }
        }
    </style>
</head>

<body>
    <div class="topnavbar">
        <div class="topnavbar-inner">
            <div class="topnavbar-logo">
                <img src="assets/Optimum-Logo.png" alt="Optimum Logo">
            </div>
            <div class="topnavbar-content">
                <div class="topnavbar-links">
                    <a href="#" class="active">Home</a>

                            viewBox="0 0 10 6" fill="none">

                                stroke-linecap="round" stroke-linejoin="round" />

                                stroke-linecap="round" stroke-linejoin="round" />

                </div>
                <div class="topnavbar-actions">
                    <svg class="topnavbar-search" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none">

                            fill="#AAAAAA" stroke="#AAAAAA" stroke-width="0.5" />
                    </svg>
                    <button class="topnavbar-cta">Shop
                        For Supplies</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
