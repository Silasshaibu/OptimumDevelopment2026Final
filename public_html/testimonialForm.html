<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimonial Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,400;0,500;0,600;0,700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f6f6f6;
            font-family: 'Urbanist', sans-serif;
        }

        .testimonial-form-shell {
            display: inline-flex;
            padding: 40px;
            align-items: stretch;
            gap: 40px;
            border-radius: 40px;
            background: #FFF;
            width: 1320px;
        }

        .testimonial-form-card {
            width: 571px;
            min-height: 851px;
            align-self: stretch;
            position: relative;
            border-radius: 30px;
            background: #E1F2F8;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .testimonial-form-image {
            width: 571px;
            height: 757px;
            position: absolute;
            bottom: 0;
            left: 0;
            aspect-ratio: 43 / 57;
            object-fit: cover;
            object-position: left;
        }

        .testimonial-form-content {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 25px;
            align-self: stretch;
        }

        /* ── Fields wrapper ── */
        .testimonial-form-fields {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 20px;
            width: 100%;
            width: 629px;
        }

        /* ── Heading block ── */
        .testimonial-form-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            width: 480px;
        }

        .testimonial-form-heading {
            color: #0E0E0E;
            font-family: Urbanist, sans-serif;
            font-size: 48px;
            width: 485px;
            font-style: normal;
            font-weight: 700;
            line-height: normal;
        }

        .testimonial-form-heading span {
            color: #399CDB;
        }

        .testimonial-form-subheading {
            color: #696969;
            font-family: Urbanist, sans-serif;
            font-size: 24px;
            font-style: normal;
            font-weight: 400;
            line-height: 34px;
        }

        .testimonial-form-subheading strong {
            color: #0E0E0E;
            font-weight: 500;
        }

        /* ── Rating section ── */
        .testimonial-form-rating {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            width: 210px;
        }

        .form-label {
            color: #0E0E0E;
            font-family: Urbanist, sans-serif;
            font-size: 24px;
            font-style: normal;
            font-weight: 500;
            line-height: 34px;
        }

        .form-label .required {
            color: #FF3C3C;
            font-family: Urbanist, sans-serif;
            font-size: 24px;
            font-style: normal;
            font-weight: 500;
            line-height: 34px;
        }

        .rating-stars {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rating-stars input[type="radio"] {
            display: none;
        }

        .rating-stars label {
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rating-stars label svg {
            width: 28px;
            height: 27px;
        }

        .rating-stars label svg path {
            fill: #DDDDDD;
            transition: fill 0.15s ease;
        }

        .rating-stars label:hover svg path,
        .rating-stars label:hover~label svg path {
            fill: #DDDDDD;
        }

        .rating-stars input[type="radio"]:checked~label svg path {
            fill: #DDDDDD;
        }

        .rating-stars label.active svg path {
            fill: #FFB800;
        }

        /* ── Form groups ── */
        .testimonial-form-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            width: 100%;
        }

        .testimonial-form-group textarea {
            width: 100%;
            height: 140px;
            border-radius: 20px;
            border: 1px solid #D9D9D9;
            background: #FDFDFD;
            padding: 16px 20px;
            font-family: Urbanist, sans-serif;
            font-size: 16px;
            resize: none;
            outline: none;
        }

        .testimonial-form-group input[type="text"],
        .testimonial-form-group input[type="email"] {
            width: 100%;
            height: 60px;
            border-radius: 10px;
            border: 1px solid #D9D9D9;
            background: #FDFDFD;
            padding: 0 20px;
            font-family: Urbanist, sans-serif;
            font-size: 16px;
            outline: none;
        }

        /* ── Bottom section ── */
        .testimonial-form-bottom {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 36px;
            width: 100%;
        }

        /* ── Privacy checkbox ── */
        .testimonial-form-privacy {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .testimonial-form-privacy input[type="checkbox"] {
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 5px;
            border: 1px solid #D9D9D9;
            background: #FDFDFD;
            cursor: pointer;
            flex-shrink: 0;
        }

        .testimonial-form-privacy input[type="checkbox"]:checked {
            background: #399CDB;
            border-color: #399CDB;
        }

        .testimonial-form-privacy label {
            color: #696969;
            font-family: Urbanist, sans-serif;
            font-size: 18px;
            font-weight: 400;
            line-height: normal;
        }

        .testimonial-form-privacy label a {
            color: #399CDB;
            text-decoration: underline;
        }

        /* ── Submit button ── */
        .testimonial-form-submit {
            width: 100%;
            height: 60px;
            border-radius: 100px;
            background: #399CDB;
            border: none;
            color: #FFF;
            font-family: Urbanist, sans-serif;
            font-size: 18px;
            font-weight: 600;
            line-height: 20px;
            cursor: pointer;
            text-align: center;
        }

        .testimonial-form-submit:hover {
            background: #2d88c4;
        }
    </style>
</head>

                <!-- Your Review -->

                    <textarea placeholder="Write your review here..."></textarea>
                </div>

                <!-- Your Name -->
                <div class="testimonial-form-group">
                    <p class="form-label">Your Name<span class="required">*</span></p>
                    <input type="text" placeholder="Enter your name">
                </div>

                <!-- Your Email -->
                <div class="testimonial-form-group">
                    <p class="form-label">Your Email<span class="required">*</span></p>
                    <input type="email" placeholder="Enter your email">
                </div>

            <!-- Bottom section -->

                <div class="testimonial-form-privacy">

                    <label for="privacyConsent">I agree to <a href="#">Optimum-Payments Privacy</a> notice</label>
                </div>

            </div>

    <script>
        /* Star rating interaction */
        (function () {
            var container = document.getElementById('ratingStars');
            var labels = container.querySelectorAll('label');
            var currentRating = 0;

            function updateStars(rating) {
                labels.forEach(function (lbl) {
                    var val = parseInt(lbl.getAttribute('data-value'));
                    if (val <= rating) {
                        lbl.classList.add('active');
                    } else {
                        lbl.classList.remove('active');
                    }
                });
            }

            labels.forEach(function (lbl) {
                lbl.addEventListener('click', function () {
                    currentRating = parseInt(this.getAttribute('data-value'));
                    updateStars(currentRating);
                });
                lbl.addEventListener('mouseenter', function () {
                    updateStars(parseInt(this.getAttribute('data-value')));
                });
            });

            container.addEventListener('mouseleave', function () {
                updateStars(currentRating);
            });
        })();
    </script>
