<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top-Selling Products - Optimum Payments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,400;0,500;0,600;0,700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Urbanist', sans-serif;
        }

        .tsp-block {
            position: relative;
            display: flex;
            width: 1200px;
            flex-direction: column;
            align-items: flex-start;
            row-gap: 40px;
        }

        .tsp-block--head span.tsp-title-dark {
            color: #0E0E0E;
            font-family: 'Urbanist', sans-serif;
            font-size: 60px;
            font-style: normal;
            font-weight: 700;
            line-height: normal;
        }

        .tsp-block--head span.tsp-title-blue {
            color: #399CDB;
            font-family: 'Urbanist', sans-serif;
            font-size: 60px;
            font-style: normal;
            font-weight: 700;
            line-height: normal;
        }

        .tsp-block--head .tsp-subtitle {
            color: #696969;
            font-family: 'Urbanist', sans-serif;
            font-size: 24px;
            font-style: normal;
            font-weight: 400;
            line-height: 34px;
            margin-top: 16px;
        }

        .tsp-card {
            position: relative;
            width: 588px;
            height: 320px;
            border-radius: 24px;
            background: #FFF;
            box-shadow: 0px 10px 20px 0px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            padding: 40px;
        }

        .tsp-card__bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
            pointer-events: none;
        }

        .tsp-card__info {
            position: relative;
            display: inline-flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            gap: 69px;
            width: 266px;
            height: 100%;
        }

        .tsp-card__info-top {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-self: stretch;
        }

        .tsp-card__title {
            color: #0E0E0E;
            font-family: 'Urbanist', sans-serif;
            font-size: 40px;
            font-style: normal;
            font-weight: 700;
            line-height: normal;
        }

        .tsp-card__desc {
            color: #696969;
            font-family: 'Urbanist', sans-serif;
            font-size: 20px;
            font-style: normal;
            font-weight: 400;
            line-height: 30px;
        }

        .tsp-card__btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 142px;
            height: 48px;
            border-radius: 100px;
            background: #399CDB;
            border: none;
            color: #FFF;
            font-family: 'Urbanist', sans-serif;
            font-size: 16px;
            font-style: normal;
            font-weight: 600;
            line-height: 16px;
            text-decoration: none;
            cursor: pointer;
        }

        .tsp-block--body {
            display: flex;
            align-items: flex-start;
            gap: 24px;
            width: 100%;
        }
    </style>
</head>

<body>

                    <div class="tsp-card__info-top">
                        <div class="tsp-card__title">Valor VP 550</div>

            <span
                style="color: #399CDB; text-align: center; font-family: Urbanist; font-size: 18px; font-style: normal; font-weight: 600; line-height: normal;">View
                All</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="6" height="10" viewBox="0 0 6 10" fill="none"
                style="width: 4px; height: 8px; flex-shrink: 0; stroke-width: 1.5px; stroke: #399CDB;">
                <path d="M0.75 8.75L4.75 4.75L0.75 0.75" stroke="#399CDB" stroke-width="1.5" stroke-linecap="round"

</html>
