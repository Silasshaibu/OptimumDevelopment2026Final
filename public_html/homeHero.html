<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Hero - Optimum Payments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,400;0,500;0,600;0,700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Urbanist', sans-serif;
        }

        .home-hero {
            position: relative;
            width: 1440px;
            padding-left: 120px;
            padding-top: 132px;
            margin-bottom: 120px;
            height: 728px;
            background: url('assets/AccelerateMerchantApplication.jpg') lightgray 50% / cover no-repeat;
            overflow: hidden;
        }

        .home-hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(43, 43, 43, 0.5);
            /* semi-transparent dark overlay */
            background: rgba(20, 20, 20, 0.5);
            /* semi-transparent very dark overlay */
            z-index: 1;
            pointer-events: none;
        }

        .home-hero>* {
            position: relative;
            z-index: 2;
        }

        .carouselSlideProgressBarContainer {
            position: absolute;
            display: inline-flex;
            height: 10px;
            align-items: center;
            gap: 3px;
            left: 50%;
            transform: translateX(-50%);
            bottom: 40px;
        }

        .carouselSlideProgressBar {
            width: 30px;
            height: 10px;
            border-radius: 10px;
            background: #FFF;
            transition: cursor 0.2s;
        }

        .carouselSlideProgressBarInactive {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.40);
            transition: cursor 0.2s;
        }

        .carouselSlideProgressBar:hover,
        .carouselSlideProgressBarInactive:hover {
            cursor: pointer;
        }

        .home-hero button:hover {
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="home-hero">
        <div class="carouselSlideProgressBarContainer">
            <div class="carouselSlideProgressBar"></div>
            <div class="carouselSlideProgressBarInactive"></div>
            <div class="carouselSlideProgressBarInactive"></div>
        </div>
        <div class="hero-info-left"
            style="display: flex; width: 701px; flex-direction: column; align-items: flex-start; gap: 40px;">
            <div style="display: flex; flex-direction: column; row-gap: 15px;">
                <p
                    style="color: #399CDB; font-family: Urbanist; font-size: 24px; font-style: normal; font-weight: 600; line-height: normal;">
                    Optimum Payments</p>
                <p><span
                        style="color: #FFF; font-family: Urbanist; font-size: 72px; font-style: normal; font-weight: 700; line-height: normal;">Accelerate
                        Your</span><br><span
                        style="color: #399CDB; font-family: Urbanist; font-size: 72px; font-style: normal; font-weight: 700; line-height: normal;">Merchant
                        Application</span></p>
            </div>
            <div style="display: flex; flex-direction: column; row-gap: 40px;">
                <p
                    style="color: rgba(255, 255, 255, 0.70); font-family: Urbanist; font-size: 24px; font-style: normal; font-weight: 500; line-height: 34px;">
                    Access the capital you need to grow with transparent terms and
                    quick approval cycles.</p>
                <div style="display: flex; gap: 10px; margin-top: 24px;">
                    <button
                        style="display: flex; height: 48px; padding: 16px 36px 16px 35px; justify-content: center; align-items: center; border-radius: 100px; background: #399CDB; border: none;">
                        <span
                            style="color: #FFF; text-align: center; font-family: Urbanist; font-size: 16px; font-style: normal; font-weight: 600; line-height: 16px;">Apply
                            Now</span>
                    </button>
                    <button
                        style="display: flex; height: 48px; padding: 16px 35px 16px 33px; justify-content: center; align-items: center; border-radius: 100px; background: transparent; border: 1px solid #399CDB;">
                        <span
                            style="color: #399CDB; text-align: center; font-family: Urbanist; font-size: 16px; font-style: normal; font-weight: 600; line-height: 16px;">Learn
                            More</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
